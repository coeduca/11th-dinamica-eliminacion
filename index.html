<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dinámica de Eliminación - 2do Año</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            /* Degradado más moderno y vibrante */
            --bg-gradient: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            --card-active: #ffffff;
            --card-eliminated: rgba(255, 255, 255, 0.15);
            --text-main: #2d3436;
            --primary-btn: #ff4757;
            --primary-hover: #ff6b81;
            --save-btn: #2ed573;
            --save-hover: #7bed9f;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Poppins', sans-serif;
        }

        body {
            background: var(--bg-gradient);
            min-height: 100vh;
            color: var(--text-main);
            padding: 30px 20px;
        }

        h1, h2 {
            text-align: center;
            color: #fff;
            letter-spacing: 1px;
        }

        h1 {
            font-size: 2.5rem;
            font-weight: 800;
            text-shadow: 0 4px 15px rgba(0,0,0,0.2);
            margin-bottom: 5px;
        }

        /* --- MODAL --- */
        #modal-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.4);
            backdrop-filter: blur(8px); /* Efecto cristal */
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .modal-content {
            background: #ffffff;
            padding: 40px;
            border-radius: 24px;
            width: 90%;
            max-width: 600px;
            max-height: 85vh;
            display: flex;
            flex-direction: column;
            box-shadow: 0 25px 50px rgba(0,0,0,0.3);
            animation: popIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        }

        .modal-content h2 {
            color: #2d3436;
            margin-bottom: 10px;
            font-weight: 800;
        }

        .modal-content p {
            text-align: center;
            margin-bottom: 25px;
            color: #636e72;
            font-size: 0.95rem;
        }

        #checkbox-list {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            overflow-y: auto;
            padding-right: 10px;
            margin-bottom: 20px;
        }

        /* Scrollbar personalizado para el modal */
        #checkbox-list::-webkit-scrollbar { width: 6px; }
        #checkbox-list::-webkit-scrollbar-track { background: #f1f2f6; border-radius: 10px; }
        #checkbox-list::-webkit-scrollbar-thumb { background: #b2bec3; border-radius: 10px; }

        .student-checkbox {
            display: flex;
            align-items: center;
            padding: 12px 15px;
            background: #f8f9fa;
            border: 2px solid transparent;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.2s ease;
            font-weight: 600;
            color: #2d3436;
        }

        .student-checkbox:hover {
            background: #f1f2f6;
            transform: translateY(-2px);
        }

        .student-checkbox input {
            margin-right: 12px;
            width: 18px;
            height: 18px;
            accent-color: var(--primary-btn);
            cursor: pointer;
        }

        .start-btn {
            width: 100%;
            padding: 16px;
            background: var(--primary-btn);
            color: white;
            border: none;
            border-radius: 14px;
            font-size: 1.1rem;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 1px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 8px 20px rgba(255, 71, 87, 0.4);
        }

        .start-btn:hover {
            background: var(--primary-hover);
            transform: translateY(-3px);
            box-shadow: 0 12px 25px rgba(255, 71, 87, 0.5);
        }

        /* --- CONTENEDORES Y TARJETAS --- */
        .container {
            max-width: 1200px;
            margin: 0 auto;
            display: none;
        }

        .subtitle {
            text-align: center;
            color: rgba(255, 255, 255, 0.9);
            margin-bottom: 30px;
            font-size: 1rem;
            font-weight: 400;
        }

        .section-title {
            margin-top: 50px;
            margin-bottom: 25px;
            font-size: 1.8rem;
            color: rgba(255, 255, 255, 0.9);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
        }

        .section-title::before, .section-title::after {
            content: '';
            height: 2px;
            background: rgba(255,255,255,0.2);
            flex: 1;
            max-width: 100px;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
            gap: 20px;
        }

        .card {
            background: var(--card-active);
            padding: 25px 20px;
            border-radius: 18px;
            text-align: center;
            font-weight: 600;
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
            position: relative;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 110px;
        }

        .card h3 {
            font-size: 1.1rem;
            margin: 0;
            color: var(--text-main);
        }

        .card.active-card {
            border-bottom: 5px solid var(--primary-btn);
        }

        .card.active-card:hover {
            transform: translateY(-8px) scale(1.02);
            box-shadow: 0 15px 30px rgba(0,0,0,0.15);
            border-bottom-color: var(--primary-hover);
        }

        /* Estilo Glassmorphism para eliminados */
        .card.eliminated-card {
            background: var(--card-eliminated);
            backdrop-filter: blur(5px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-bottom: 5px solid rgba(255, 255, 255, 0.3);
            box-shadow: none;
            cursor: default;
        }

        .card.eliminated-card h3 {
            color: rgba(255, 255, 255, 0.6) !important;
            text-decoration: line-through;
            font-weight: 400;
        }

        .save-btn {
            margin-top: 15px;
            padding: 8px 20px;
            background: var(--save-btn);
            color: #fff;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 800;
            font-size: 0.9rem;
            text-transform: uppercase;
            transition: all 0.3s ease;
            box-shadow: 0 4px 10px rgba(46, 213, 115, 0.3);
        }

        .save-btn:hover {
            background: var(--save-hover);
            transform: scale(1.05);
            box-shadow: 0 6px 15px rgba(46, 213, 115, 0.4);
        }

        /* --- ANIMACIONES --- */
        .fade-out {
            opacity: 0;
            transform: scale(0.8) translateY(20px);
        }

        .pop-in {
            animation: popIn 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        }

        @keyframes popIn {
            0% { opacity: 0; transform: scale(0.8) translateY(10px); }
            100% { opacity: 1; transform: scale(1) translateY(0); }
        }

        /* --- GANADOR --- */
        #winner-banner {
            display: none;
            text-align: center;
            background: linear-gradient(135deg, #f6d365 0%, #fda085 100%);
            padding: 50px 20px;
            border-radius: 24px;
            margin-bottom: 40px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
            border: 4px solid #fff;
            animation: popIn 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        }

        #winner-banner h2 {
            color: #fff;
            font-size: 1.5rem;
            text-transform: uppercase;
            letter-spacing: 3px;
            margin-bottom: 10px;
            text-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        #winner-banner h1 {
            color: #fff;
            font-size: 4rem;
            margin: 0;
            text-shadow: 0 4px 10px rgba(0,0,0,0.2);
        }
    </style>
</head>
<body>

    <div id="modal-overlay">
        <div class="modal-content">
            <h2>Pasar Asistencia</h2>
            <p>Desmarca a los estudiantes que no asistieron hoy para excluirlos de la dinámica.</p>
            <div id="checkbox-list"></div>
            <button class="start-btn" onclick="iniciarJuego()">Comenzar Dinámica</button>
        </div>
    </div>

    <div id="game-container" class="container">
        
        <div id="winner-banner">
            <h2>¡Tenemos un ganador!</h2>
            <h1 id="winner-name"></h1>
        </div>

        <h1 id="title-activos">Estudiantes Activos (<span id="count-activos">0</span>)</h1>
        <p class="subtitle" id="subtitle-activos">Toca la tarjeta de un estudiante para eliminarlo de la ronda.</p>
        
        <div id="active-grid" class="grid">
            </div>

        <h2 class="section-title">Zona de Eliminados</h2>
        <div id="eliminated-grid" class="grid">
            </div>
    </div>

    <script>
        // Lista original proporcionada (solo nombres limpios)
        const allStudents = [
            "José María Barrera", "Abel Barrera", "Maicol Barrera", 
            "Estephany Berríos", "Amy Cañas", "Mauricio Córdova", 
            "Óscar Kennedy", "Estiven Hernández", "Juan David", 
            "Yuleyde López", "Cintia Martínez", "Wilmer Mejía", 
            "Lisbeth Mejía", "Kevin Monterrosa", "Alfredo Osorio", 
            "Ángel Quezada", "Sophia Quinteros", "Leonel Rivera"
        ];

        let activeStudents = [];
        let eliminatedStudents = [];

        // 1. Inicializar Modal
        window.onload = () => {
            const listContainer = document.getElementById('checkbox-list');
            allStudents.forEach((student, index) => {
                const label = document.createElement('label');
                label.className = 'student-checkbox';
                label.innerHTML = `
                    <input type="checkbox" id="student-${index}" value="${student}" checked>
                    ${student}
                `;
                listContainer.appendChild(label);
            });
        };

        // 2. Comenzar el juego
        function iniciarJuego() {
            const checkboxes = document.querySelectorAll('.student-checkbox input:checked');
            if (checkboxes.length < 2) {
                alert("Por favor, selecciona al menos 2 estudiantes para jugar.");
                return;
            }

            checkboxes.forEach(cb => {
                activeStudents.push(cb.value);
            });

            // Ocultar modal y mostrar juego
            document.getElementById('modal-overlay').style.display = 'none';
            document.getElementById('game-container').style.display = 'block';
            
            renderizarPantalla();
        }

        // 3. Renderizar Tarjetas
        function renderizarPantalla() {
            const activeGrid = document.getElementById('active-grid');
            const eliminatedGrid = document.getElementById('eliminated-grid');
            const winnerBanner = document.getElementById('winner-banner');
            const titleActivos = document.getElementById('title-activos');
            const subtitleActivos = document.getElementById('subtitle-activos');
            
            document.getElementById('count-activos').innerText = activeStudents.length;

            activeGrid.innerHTML = '';
            eliminatedGrid.innerHTML = '';

            // Verificar Ganador
            if (activeStudents.length === 1 && eliminatedStudents.length > 0) {
                lanzarConfeti();
                winnerBanner.style.display = 'block';
                document.getElementById('winner-name').innerText = activeStudents[0];
                titleActivos.style.display = 'none';
                subtitleActivos.style.display = 'none';
            } else {
                winnerBanner.style.display = 'none';
                titleActivos.style.display = 'block';
                subtitleActivos.style.display = 'block';
            }

            // Renderizar Activos
            activeStudents.forEach((student, index) => {
                const card = document.createElement('div');
                card.className = 'card active-card pop-in';
                card.innerHTML = `<h3>${student}</h3>`;
                card.onclick = () => eliminarEstudiante(index, card);
                activeGrid.appendChild(card);
            });

            // Renderizar Eliminados
            eliminatedStudents.forEach((student, index) => {
                const card = document.createElement('div');
                card.className = 'card eliminated-card pop-in';
                card.innerHTML = `
                    <h3 style="color: #666; text-decoration: line-through;">${student}</h3>
                    <button class="save-btn" onclick="salvarEstudiante(${index}, this.parentElement)">¡Salvar!</button>
                `;
                eliminatedGrid.appendChild(card);
            });
        }

        // 4. Lógica para Eliminar
        function eliminarEstudiante(index, cardElement) {
            // Añadir clase de animación de salida
            cardElement.classList.add('fade-out');
            
            // Esperar a que termine la animación (300ms) antes de mover los datos
            setTimeout(() => {
                const student = activeStudents.splice(index, 1)[0];
                eliminatedStudents.push(student);
                renderizarPantalla();
            }, 300);
        }

        // 5. Lógica para Salvar
        function salvarEstudiante(index, cardElement) {
            // Evitar que el clic se propague
            event.stopPropagation();

            cardElement.classList.add('fade-out');
            
            setTimeout(() => {
                const student = eliminatedStudents.splice(index, 1)[0];
                activeStudents.push(student);
                renderizarPantalla();
            }, 300);
        }

        // 6. Efecto de Confeti (Opcional, hace la victoria más emocionante)
        function lanzarConfeti() {
            var duration = 3000;
            var end = Date.now() + duration;

            (function frame() {
                confetti({
                    particleCount: 5,
                    angle: 60,
                    spread: 55,
                    origin: { x: 0 },
                    colors: ['#ff6b81', '#ffffff', '#2ed573']
                });
                confetti({
                    particleCount: 5,
                    angle: 120,
                    spread: 55,
                    origin: { x: 1 },
                    colors: ['#ff6b81', '#ffffff', '#2ed573']
                });

                if (Date.now() < end) {
                    requestAnimationFrame(frame);
                }
            }());
        }
    </script>
</body>
</html>

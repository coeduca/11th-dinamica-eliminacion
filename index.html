<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dinámica de Eliminación - 2do Año</title>

<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap" rel="stylesheet">

<style>
:root {
    --bg-gradient: linear-gradient(135deg, #667eea, #764ba2);
    --text-main: #2d3436;
}

/* BASE */
* {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
    font-family: 'Poppins', sans-serif;
}

body {
    background: var(--bg-gradient);
    min-height: 100vh;
    padding: 30px 20px;
    color: white;
}

h1, h2 {
    text-align: center;
}

/* MODAL */
#modal-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.5);
    backdrop-filter: blur(8px);
    display: flex;
    justify-content: center;
    align-items: center;
}

.modal-content {
    background: white;
    color: #333;
    padding: 30px;
    border-radius: 20px;
    width: 90%;
    max-width: 600px;
}

#checkbox-list {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    margin: 20px 0;
}

.student-checkbox {
    background: #f1f2f6;
    padding: 10px;
    border-radius: 10px;
    cursor: pointer;
}

.start-btn {
    width: 100%;
    padding: 14px;
    background: #ff4757;
    border: none;
    color: white;
    border-radius: 12px;
    cursor: pointer;
    font-weight: bold;
}

/* GRID */
.container {
    display: none;
    max-width: 1000px;
    margin: auto;
}

.grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
    gap: 14px;
}

/* CARDS COMPACTAS + COLOR */
.card {
    padding: 14px;
    border-radius: 14px;
    text-align: center;
    cursor: pointer;
    min-height: 70px;
    display: flex;
    align-items: center;
    justify-content: center;
    color: white;
    font-weight: 600;
    transition: 0.25s;
}

.card:hover {
    transform: translateY(-5px);
}

/* ELIMINADOS */
.eliminated-card {
    background: rgba(255,255,255,0.2) !important;
    backdrop-filter: blur(5px);
}

.eliminated-card h3 {
    text-decoration: line-through;
    opacity: 0.7;
}

/* BOTÓN SALVAR */
.save-btn {
    margin-top: 8px;
    padding: 6px 12px;
    border: none;
    border-radius: 8px;
    background: #2ed573;
    color: white;
    cursor: pointer;
}

/* ANIMACIÓN CAÍDA */
.fall-out {
    animation: fall 0.5s forwards;
}

@keyframes fall {
    0% { transform: rotate(0); opacity: 1; }
    50% { transform: rotate(10deg) translateY(20px); }
    100% { transform: rotate(25deg) translateY(120px); opacity: 0; }
}

/* GANADOR */
#winner-banner {
    display: none;
    text-align: center;
    margin-bottom: 30px;
}

#winner-banner h1 {
    font-size: 3rem;
}
</style>
</head>

<body>

<div id="modal-overlay">
    <div class="modal-content">
        <h2>Pasar Asistencia</h2>
        <div id="checkbox-list"></div>
        <button class="start-btn" onclick="iniciarJuego()">Comenzar</button>
    </div>
</div>

<div id="game-container" class="container">

    <div id="winner-banner">
        <h2>Ganador 🎉</h2>
        <h1 id="winner-name"></h1>
    </div>

    <h1>Activos (<span id="count-activos">0</span>)</h1>
    <div id="active-grid" class="grid"></div>

    <h2>Eliminados</h2>
    <div id="eliminated-grid" class="grid"></div>

</div>

<script>
const allStudents = [
"José María Barrera","Abel Barrera","Maicol Barrera",
"Estephany Berríos","Amy Cañas","Mauricio Córdova",
"Óscar Kennedy","Estiven Hernández","Juan David",
"Yuleyde López","Cintia Martínez","Wilmer Mejía",
"Lisbeth Mejía","Kevin Monterrosa","Alfredo Osorio",
"Ángel Quezada","Sophia Quinteros","Leonel Rivera"
];

let activeStudents = [];
let eliminatedStudents = [];

/* 🎨 GRADIENTES RANDOM */
function getRandomGradient(){
    const g=[
        "linear-gradient(135deg,#ff7e5f,#e84393)",
        "linear-gradient(135deg,#36d1dc,#5b86e5)",
        "linear-gradient(135deg,#f7971e,#ffd200)",
        "linear-gradient(135deg,#00c6ff,#0072ff)",
        "linear-gradient(135deg,#ff6a00,#ee0979)",
        "linear-gradient(135deg,#56ab2f,#a8e063)",
        "linear-gradient(135deg,#8e2de2,#4a00e0)",
        "linear-gradient(135deg,#ff416c,#ff4b2b)"
    ];
    return g[Math.floor(Math.random()*g.length)];
}

/* INIT */
window.onload=()=>{
    const list=document.getElementById('checkbox-list');
    allStudents.forEach((s,i)=>{
        const l=document.createElement('label');
        l.className='student-checkbox';
        l.innerHTML=`<input type="checkbox" checked value="${s}"> ${s}`;
        list.appendChild(l);
    });
};

function iniciarJuego(){
    const checks=document.querySelectorAll('input:checked');
    if(checks.length<2){alert("Minimo 2");return;}

    checks.forEach(c=>activeStudents.push(c.value));

    document.getElementById('modal-overlay').style.display='none';
    document.getElementById('game-container').style.display='block';

    render();
}

function render(){
    const ag=document.getElementById('active-grid');
    const eg=document.getElementById('eliminated-grid');

    ag.innerHTML="";
    eg.innerHTML="";

    document.getElementById('count-activos').innerText=activeStudents.length;

    if(activeStudents.length===1 && eliminatedStudents.length>0){
        document.getElementById('winner-banner').style.display='block';
        document.getElementById('winner-name').innerText=activeStudents[0];
        confetti();
    }

    activeStudents.forEach((s,i)=>{
        const c=document.createElement('div');
        c.className='card';
        c.style.background=getRandomGradient();
        c.innerHTML=`<h3>${s}</h3>`;
        c.onclick=()=>eliminar(i,c);
        ag.appendChild(c);
    });

    eliminatedStudents.forEach((s,i)=>{
        const c=document.createElement('div');
        c.className='card eliminated-card';
        c.innerHTML=`<h3>${s}</h3>
        <button class="save-btn" onclick="salvar(${i},this.parentElement)">Salvar</button>`;
        eg.appendChild(c);
    });
}

function eliminar(i,el){
    el.classList.add('fall-out');
    setTimeout(()=>{
        eliminatedStudents.push(activeStudents.splice(i,1)[0]);
        render();
    },400);
}

function salvar(i,el){
    event.stopPropagation();
    el.classList.add('fall-out');
    setTimeout(()=>{
        activeStudents.push(eliminatedStudents.splice(i,1)[0]);
        render();
    },400);
}
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dinámica de Eliminación - 2do Año</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        :root {
            --bg-gradient: linear-gradient(135deg, #ff9a9e 0%, #fecfef 99%, #fecfef 100%);
            --card-active: #ffffff;
            --card-eliminated: #ffdde1;
            --text-main: #333333;
            --primary-btn: #ff6b81;
            --primary-hover: #ff4757;
            --save-btn: #2ed573;
            --save-hover: #2ce976;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background: var(--bg-gradient);
            min-height: 100vh;
            color: var(--text-main);
            padding: 20px;
        }

        h1, h2 {
            text-align: center;
            margin-bottom: 20px;
            color: #fff;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.2);
        }

        /* --- MODAL --- */
        #modal-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.6);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .modal-content {
            background: #fff;
            padding: 30px;
            border-radius: 15px;
            width: 90%;
            max-width: 500px;
            max-height: 80vh;
            overflow-y: auto;
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
        }

        .modal-content h2 {
            color: var(--primary-btn);
            text-shadow: none;
        }

        .student-checkbox {
            display: flex;
            align-items: center;
            margin-bottom: 10px;
            padding: 10px;
            background: #f1f2f6;
            border-radius: 8px;
            cursor: pointer;
            transition: background 0.3s;
        }

        .student-checkbox:hover {
            background: #dfe4ea;
        }

        .student-checkbox input {
            margin-right: 15px;
            width: 20px;
            height: 20px;
            cursor: pointer;
        }

        .start-btn {
            display: block;
            width: 100%;
            padding: 15px;
            margin-top: 20px;
            background: var(--primary-btn);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.3s;
        }

        .start-btn:hover {
            background: var(--primary-hover);
        }

        /* --- CONTENEDORES Y TARJETAS --- */
        .container {
            max-width: 1200px;
            margin: 0 auto;
            display: none; /* Se muestra después del modal */
        }

        .section-title {
            margin-top: 40px;
            margin-bottom: 15px;
            border-bottom: 2px solid rgba(255,255,255,0.5);
            padding-bottom: 5px;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 15px;
        }

        .card {
            background: var(--card-active);
            padding: 20px;
            border-radius: 12px;
            text-align: center;
            font-weight: bold;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            cursor: pointer;
            transition: transform 0.3s, opacity 0.4s;
            position: relative;
            overflow: hidden;
        }

        .card:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 15px rgba(0,0,0,0.15);
        }

        .card.active-card {
            border-left: 5px solid var(--primary-btn);
        }

        .card.eliminated-card {
            background: var(--card-eliminated);
            border-left: 5px solid #747d8c;
            opacity: 0.8;
            cursor: default;
        }

        .card.eliminated-card:hover {
            transform: none;
        }

        .save-btn {
            margin-top: 15px;
            padding: 8px 15px;
            background: var(--save-btn);
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            transition: background 0.3s;
        }

        .save-btn:hover {
            background: var(--save-hover);
        }

        /* --- ANIMACIONES --- */
        .fade-out {
            opacity: 0;
            transform: scale(0.8);
        }

        .pop-in {
            animation: popIn 0.4s ease-out forwards;
        }

        @keyframes popIn {
            0% { opacity: 0; transform: scale(0.5); }
            100% { opacity: 1; transform: scale(1); }
        }

        /* --- GANADOR --- */
        #winner-banner {
            display: none;
            text-align: center;
            background: rgba(255, 255, 255, 0.9);
            padding: 40px;
            border-radius: 20px;
            margin-bottom: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            animation: popIn 0.5s ease-out forwards;
        }

        #winner-banner h1 {
            color: #ff4757;
            font-size: 3em;
            margin: 0;
        }
    </style>
</head>
<body>

    <div id="modal-overlay">
        <div class="modal-content">
            <h2>Seleccionar Estudiantes</h2>
            <p style="margin-bottom: 15px; color: #666;">Desmarca a los estudiantes que no asistieron hoy.</p>
            <div id="checkbox-list"></div>
            <button class="start-btn" onclick="iniciarJuego()">Comenzar Dinámica</button>
        </div>
    </div>

    <div id="game-container" class="container">
        
        <div id="winner-banner">
            <h2>¡TENEMOS UN GANADOR!</h2>
            <h1 id="winner-name"></h1>
        </div>

        <h1 id="title-activos">Estudiantes Activos (<span id="count-activos">0</span>)</h1>
        <p style="text-align: center; color: white; margin-bottom: 20px;">Toca la tarjeta de un estudiante para eliminarlo.</p>
        
        <div id="active-grid" class="grid">
            </div>

        <h2 class="section-title">Zona de Eliminados</h2>
        <div id="eliminated-grid" class="grid">
            </div>
    </div>

    <script>
        // Lista original proporcionada (solo nombres limpios)
        const allStudents = [
            "José María Barrera", "Abel Barrera", "Maicol Barrera", 
            "Estephany Berríos", "Amy Cañas", "Mauricio Córdova", 
            "Óscar Kennedy", "Estiven Hernández", "Juan David", 
            "Yuleyde López", "Cintia Martínez", "Wilmer Mejía", 
            "Lisbeth Mejía", "Kevin Monterrosa", "Alfredo Osorio", 
            "Ángel Quezada", "Sophia Quinteros", "Leonel Rivera"
        ];

        let activeStudents = [];
        let eliminatedStudents = [];

        // 1. Inicializar Modal
        window.onload = () => {
            const listContainer = document.getElementById('checkbox-list');
            allStudents.forEach((student, index) => {
                const label = document.createElement('label');
                label.className = 'student-checkbox';
                label.innerHTML = `
                    <input type="checkbox" id="student-${index}" value="${student}" checked>
                    ${student}
                `;
                listContainer.appendChild(label);
            });
        };

        // 2. Comenzar el juego
        function iniciarJuego() {
            const checkboxes = document.querySelectorAll('.student-checkbox input:checked');
            if (checkboxes.length < 2) {
                alert("Por favor, selecciona al menos 2 estudiantes para jugar.");
                return;
            }

            checkboxes.forEach(cb => {
                activeStudents.push(cb.value);
            });

            // Ocultar modal y mostrar juego
            document.getElementById('modal-overlay').style.display = 'none';
            document.getElementById('game-container').style.display = 'block';
            
            renderizarPantalla();
        }

        // 3. Renderizar Tarjetas
        function renderizarPantalla() {
            const activeGrid = document.getElementById('active-grid');
            const eliminatedGrid = document.getElementById('eliminated-grid');
            const winnerBanner = document.getElementById('winner-banner');
            const titleActivos = document.getElementById('title-activos');
            
            document.getElementById('count-activos').innerText = activeStudents.length;

            activeGrid.innerHTML = '';
            eliminatedGrid.innerHTML = '';

            // Verificar Ganador
            if (activeStudents.length === 1 && eliminatedStudents.length > 0) {
                lanzarConfeti();
                winnerBanner.style.display = 'block';
                document.getElementById('winner-name').innerText = activeStudents[0];
                titleActivos.style.display = 'none';
            } else {
                winnerBanner.style.display = 'none';
                titleActivos.style.display = 'block';
            }

            // Renderizar Activos
            activeStudents.forEach((student, index) => {
                const card = document.createElement('div');
                card.className = 'card active-card pop-in';
                card.innerHTML = `<h3>${student}</h3>`;
                card.onclick = () => eliminarEstudiante(index, card);
                activeGrid.appendChild(card);
            });

            // Renderizar Eliminados
            eliminatedStudents.forEach((student, index) => {
                const card = document.createElement('div');
                card.className = 'card eliminated-card pop-in';
                card.innerHTML = `
                    <h3 style="color: #666; text-decoration: line-through;">${student}</h3>
                    <button class="save-btn" onclick="salvarEstudiante(${index}, this.parentElement)">¡Salvar!</button>
                `;
                eliminatedGrid.appendChild(card);
            });
        }

        // 4. Lógica para Eliminar
        function eliminarEstudiante(index, cardElement) {
            // Añadir clase de animación de salida
            cardElement.classList.add('fade-out');
            
            // Esperar a que termine la animación (300ms) antes de mover los datos
            setTimeout(() => {
                const student = activeStudents.splice(index, 1)[0];
                eliminatedStudents.push(student);
                renderizarPantalla();
            }, 300);
        }

        // 5. Lógica para Salvar
        function salvarEstudiante(index, cardElement) {
            // Evitar que el clic se propague
            event.stopPropagation();

            cardElement.classList.add('fade-out');
            
            setTimeout(() => {
                const student = eliminatedStudents.splice(index, 1)[0];
                activeStudents.push(student);
                renderizarPantalla();
            }, 300);
        }

        // 6. Efecto de Confeti (Opcional, hace la victoria más emocionante)
        function lanzarConfeti() {
            var duration = 3000;
            var end = Date.now() + duration;

            (function frame() {
                confetti({
                    particleCount: 5,
                    angle: 60,
                    spread: 55,
                    origin: { x: 0 },
                    colors: ['#ff6b81', '#ffffff', '#2ed573']
                });
                confetti({
                    particleCount: 5,
                    angle: 120,
                    spread: 55,
                    origin: { x: 1 },
                    colors: ['#ff6b81', '#ffffff', '#2ed573']
                });

                if (Date.now() < end) {
                    requestAnimationFrame(frame);
                }
            }());
        }
    </script>
</body>
</html>

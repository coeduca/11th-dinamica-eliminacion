<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dinámica de Eliminación - 2do Año</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-1: #667eea;
            --bg-2: #764ba2;
            --bg-3: #2b5876;
            --card-active: rgba(255, 255, 255, 0.92);
            --card-eliminated: rgba(255, 255, 255, 0.14);
            --text-main: #1f2937;
            --text-soft: rgba(255, 255, 255, 0.86);
            --primary-btn: #ff4757;
            --primary-hover: #ff6b81;
            --save-btn: #2ed573;
            --save-hover: #7bed9f;
            --glass: rgba(255, 255, 255, 0.14);
            --glass-border: rgba(255, 255, 255, 0.22);
            --shadow-lg: 0 22px 60px rgba(0, 0, 0, 0.28);
            --shadow-md: 0 14px 30px rgba(0, 0, 0, 0.18);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Poppins', sans-serif;
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            min-height: 100vh;
            color: var(--text-main);
            padding: 28px 18px 40px;
            overflow-x: hidden;
            background:
                radial-gradient(circle at 15% 20%, rgba(255,255,255,0.18), transparent 18%),
                radial-gradient(circle at 85% 10%, rgba(255,255,255,0.10), transparent 16%),
                radial-gradient(circle at 80% 85%, rgba(255,255,255,0.12), transparent 20%),
                linear-gradient(135deg, var(--bg-1) 0%, var(--bg-2) 55%, var(--bg-3) 100%);
            background-size: 100% 100%, 100% 100%, 100% 100%, 100% 100%;
            animation: bgShift 14s ease-in-out infinite alternate;
        }

        body::before,
        body::after {
            content: '';
            position: fixed;
            inset: auto;
            width: 380px;
            height: 380px;
            border-radius: 50%;
            filter: blur(60px);
            opacity: 0.18;
            pointer-events: none;
            z-index: 0;
            animation: floatBlob 18s ease-in-out infinite;
        }

        body::before {
            left: -90px;
            top: 10%;
            background: #ffffff;
        }

        body::after {
            right: -120px;
            bottom: 8%;
            background: #ffd166;
            animation-delay: -6s;
        }

        @keyframes bgShift {
            0% { filter: saturate(1) brightness(1); transform: scale(1); }
            100% { filter: saturate(1.08) brightness(1.03); transform: scale(1.02); }
        }

        @keyframes floatBlob {
            0%, 100% { transform: translateY(0) translateX(0) scale(1); }
            50% { transform: translateY(-18px) translateX(10px) scale(1.05); }
        }

        h1, h2 {
            text-align: center;
            color: #fff;
            letter-spacing: 0.5px;
        }

        h1 {
            font-size: clamp(2rem, 4vw, 3.4rem);
            font-weight: 900;
            text-shadow: 0 6px 24px rgba(0,0,0,0.22);
            margin-bottom: 8px;
            position: relative;
            z-index: 1;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            display: none;
            position: relative;
            z-index: 1;
        }

        .subtitle {
            text-align: center;
            color: var(--text-soft);
            margin-bottom: 30px;
            font-size: 1rem;
            font-weight: 400;
            max-width: 820px;
            margin-left: auto;
            margin-right: auto;
            text-shadow: 0 2px 10px rgba(0,0,0,0.12);
        }

        .section-title {
            margin-top: 50px;
            margin-bottom: 24px;
            font-size: clamp(1.4rem, 2.8vw, 1.9rem);
            color: rgba(255,255,255,0.92);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 14px;
            font-weight: 800;
            text-shadow: 0 3px 14px rgba(0,0,0,0.18);
        }

        .section-title::before,
        .section-title::after {
            content: '';
            height: 2px;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.35), transparent);
            flex: 1;
            max-width: 120px;
        }

        /* --- MODAL --- */
        #modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background:
                radial-gradient(circle at top, rgba(255,255,255,0.16), transparent 35%),
                rgba(0,0,0,0.38);
            backdrop-filter: blur(12px);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            padding: 18px;
            animation: overlayIn 0.4s ease both;
        }

        @keyframes overlayIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .modal-content {
            background: rgba(255, 255, 255, 0.92);
            padding: 34px 30px 28px;
            border-radius: 28px;
            width: min(92vw, 760px);
            max-height: 88vh;
            display: flex;
            flex-direction: column;
            box-shadow: var(--shadow-lg);
            border: 1px solid rgba(255,255,255,0.55);
            position: relative;
            overflow: hidden;
            animation: popIn 0.55s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        }

        .modal-content::before {
            content: '';
            position: absolute;
            inset: 0;
            background:
                radial-gradient(circle at top left, rgba(102,126,234,0.11), transparent 28%),
                radial-gradient(circle at bottom right, rgba(255,71,87,0.08), transparent 30%);
            pointer-events: none;
        }

        .modal-content h2 {
            color: #1f2937;
            margin-bottom: 8px;
            font-weight: 900;
            font-size: clamp(1.6rem, 2.5vw, 2rem);
            position: relative;
            z-index: 1;
        }

        .modal-content p {
            text-align: center;
            margin-bottom: 22px;
            color: #4b5563;
            font-size: 0.98rem;
            position: relative;
            z-index: 1;
        }

        #checkbox-list {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 12px;
            overflow-y: auto;
            padding: 6px 8px 16px 0;
            margin-bottom: 18px;
            position: relative;
            z-index: 1;
        }

        #checkbox-list::-webkit-scrollbar {
            width: 7px;
        }

        #checkbox-list::-webkit-scrollbar-track {
            background: rgba(17, 24, 39, 0.06);
            border-radius: 999px;
        }

        #checkbox-list::-webkit-scrollbar-thumb {
            background: rgba(99, 102, 241, 0.55);
            border-radius: 999px;
        }

        .student-checkbox {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 13px 15px;
            background: rgba(255,255,255,0.78);
            border: 1px solid rgba(148, 163, 184, 0.24);
            border-radius: 16px;
            cursor: pointer;
            transition: transform 0.25s ease, box-shadow 0.25s ease, border-color 0.25s ease, background 0.25s ease;
            font-weight: 600;
            color: #1f2937;
            box-shadow: 0 8px 18px rgba(15, 23, 42, 0.06);
            user-select: none;
        }

        .student-checkbox:hover {
            background: rgba(255,255,255,0.96);
            transform: translateY(-2px);
            border-color: rgba(99, 102, 241, 0.25);
            box-shadow: 0 12px 22px rgba(15, 23, 42, 0.10);
        }

        .student-checkbox input {
            width: 19px;
            height: 19px;
            accent-color: var(--primary-btn);
            cursor: pointer;
            flex: 0 0 auto;
        }

        .start-btn {
            width: 100%;
            padding: 16px 18px;
            background: linear-gradient(135deg, var(--primary-btn), #ff6b81);
            color: white;
            border: none;
            border-radius: 16px;
            font-size: 1.05rem;
            font-weight: 900;
            letter-spacing: 0.8px;
            cursor: pointer;
            transition: transform 0.25s ease, box-shadow 0.25s ease, filter 0.25s ease;
            box-shadow: 0 14px 28px rgba(255, 71, 87, 0.32);
            position: relative;
            z-index: 1;
        }

        .start-btn:hover {
            transform: translateY(-3px);
            filter: brightness(1.03);
            box-shadow: 0 18px 34px rgba(255, 71, 87, 0.42);
        }

        .start-btn:active {
            transform: translateY(-1px) scale(0.99);
        }

        /* --- GRIDS --- */
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
            gap: 18px;
        }

        .card {
            padding: 24px 20px;
            border-radius: 20px;
            text-align: center;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.25s ease, box-shadow 0.25s ease, background 0.25s ease, border-color 0.25s ease, opacity 0.25s ease;
            position: relative;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 112px;
            will-change: transform, opacity;
            overflow: hidden;
        }

        .card::after {
            content: '';
            position: absolute;
            inset: auto -20% -45% -20%;
            height: 85px;
            background: linear-gradient(180deg, transparent, rgba(255,255,255,0.16));
            transform: rotate(-6deg);
            pointer-events: none;
        }

        .card h3 {
            font-size: 1.05rem;
            margin: 0;
            line-height: 1.35;
        }

        .card.active-card {
            background: linear-gradient(180deg, rgba(255,255,255,0.98), rgba(255,255,255,0.9));
            box-shadow: 0 10px 24px rgba(0,0,0,0.14);
            border: 1px solid rgba(255,255,255,0.45);
            border-bottom: 5px solid var(--primary-btn);
            transform-origin: center;
        }

        .card.active-card:hover {
            transform: translateY(-8px) scale(1.02);
            box-shadow: 0 18px 34px rgba(0,0,0,0.18);
            border-bottom-color: var(--primary-hover);
        }

        .card.active-card h3 {
            color: #111827;
        }

        .card.eliminated-card {
            background:
                linear-gradient(180deg, rgba(255,255,255,0.14), rgba(255,255,255,0.10));
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.20);
            border-bottom: 5px solid rgba(255, 255, 255, 0.28);
            box-shadow: none;
            cursor: default;
        }

        .card.eliminated-card h3 {
            color: rgba(255, 255, 255, 0.72) !important;
            text-decoration: line-through;
            font-weight: 500;
        }

        .card.eliminated-card:hover {
            transform: translateY(-3px);
            background: rgba(255,255,255,0.18);
        }

        .save-btn {
            margin-top: 14px;
            padding: 9px 18px;
            background: linear-gradient(135deg, var(--save-btn), #22c55e);
            color: #fff;
            border: none;
            border-radius: 999px;
            cursor: pointer;
            font-weight: 900;
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 0.7px;
            transition: transform 0.25s ease, box-shadow 0.25s ease, filter 0.25s ease;
            box-shadow: 0 8px 16px rgba(46, 213, 115, 0.28);
        }

        .save-btn:hover {
            transform: translateY(-2px) scale(1.04);
            filter: brightness(1.04);
            box-shadow: 0 12px 22px rgba(46, 213, 115, 0.38);
        }

        .save-btn:active {
            transform: scale(0.98);
        }

        /* --- ANIMACIONES --- */
        .fade-out {
            opacity: 0;
            transform: scale(0.8) translateY(18px);
            filter: blur(2px);
        }

        .pop-in {
            animation: popIn 0.42s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        }

        @keyframes popIn {
            0% {
                opacity: 0;
                transform: scale(0.82) translateY(16px);
                filter: blur(5px);
            }
            100% {
                opacity: 1;
                transform: scale(1) translateY(0);
                filter: blur(0);
            }
        }

        /* --- GANADOR --- */
        #winner-banner {
            display: none;
            text-align: center;
            background:
                radial-gradient(circle at top, rgba(255,255,255,0.2), transparent 34%),
                linear-gradient(135deg, #f6d365 0%, #fda085 100%);
            padding: 44px 20px 48px;
            border-radius: 28px;
            margin-bottom: 36px;
            box-shadow: 0 22px 50px rgba(0,0,0,0.22);
            border: 2px solid rgba(255,255,255,0.7);
            position: relative;
            overflow: hidden;
            animation: winnerPop 0.7s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        }

        #winner-banner::before,
        #winner-banner::after {
            content: '';
            position: absolute;
            width: 180px;
            height: 180px;
            border-radius: 50%;
            background: rgba(255,255,255,0.16);
            filter: blur(12px);
            pointer-events: none;
        }

        #winner-banner::before {
            top: -30px;
            left: -30px;
        }

        #winner-banner::after {
            right: -30px;
            bottom: -40px;
        }

        #winner-banner h2 {
            color: #fff;
            font-size: clamp(1.1rem, 2vw, 1.5rem);
            text-transform: uppercase;
            letter-spacing: 3px;
            margin-bottom: 10px;
            text-shadow: 0 2px 6px rgba(0,0,0,0.12);
            position: relative;
            z-index: 1;
        }

        #winner-banner h1 {
            color: #fff;
            font-size: clamp(2.4rem, 5vw, 4.5rem);
            margin: 0;
            text-shadow: 0 6px 16px rgba(0,0,0,0.18);
            position: relative;
            z-index: 1;
            line-height: 1.1;
        }

        @keyframes winnerPop {
            0% { opacity: 0; transform: scale(0.85) translateY(14px); }
            60% { opacity: 1; transform: scale(1.03) translateY(-4px); }
            100% { opacity: 1; transform: scale(1) translateY(0); }
        }

        /* --- RESPONSIVE --- */
        @media (max-width: 768px) {
            body {
                padding: 20px 14px 30px;
            }

            .modal-content {
                padding: 26px 18px 18px;
                border-radius: 24px;
            }

            #checkbox-list {
                grid-template-columns: 1fr;
                gap: 10px;
            }

            .grid {
                grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
                gap: 14px;
            }

            .card {
                min-height: 96px;
                padding: 18px 14px;
                border-radius: 18px;
            }

            .card h3 {
                font-size: 0.98rem;
            }

            .start-btn {
                padding: 15px 16px;
            }

            .section-title::before,
            .section-title::after {
                max-width: 50px;
            }
        }

        @media (max-width: 480px) {
            .grid {
                grid-template-columns: 1fr 1fr;
            }

            h1 {
                line-height: 1.12;
            }
        }

        @media (prefers-reduced-motion: reduce) {
            *,
            *::before,
            *::after {
                animation-duration: 0.01ms !important;
                animation-iteration-count: 1 !important;
                transition-duration: 0.01ms !important;
                scroll-behavior: auto !important;
            }
        }
    </style>
</head>
<body>

    <div id="modal-overlay">
        <div class="modal-content">
            <h2>Pasar Asistencia</h2>
            <p>Desmarca a los estudiantes que no asistieron hoy para excluirlos de la dinámica.</p>
            <div id="checkbox-list"></div>
            <button class="start-btn" onclick="iniciarJuego()">Comenzar Dinámica</button>
        </div>
    </div>

    <div id="game-container" class="container">
        <div id="winner-banner">
            <h2>¡Tenemos un ganador!</h2>
            <h1 id="winner-name"></h1>
        </div>

        <h1 id="title-activos">Estudiantes Activos (<span id="count-activos">0</span>)</h1>
        <p class="subtitle" id="subtitle-activos">Toca la tarjeta de un estudiante para eliminarlo de la ronda.</p>

        <div id="active-grid" class="grid"></div>

        <h2 class="section-title">Zona de Eliminados</h2>
        <div id="eliminated-grid" class="grid"></div>
    </div>

    <script>
        // Lista original proporcionada (solo nombres limpios)
        const allStudents = [
            "José María Barrera", "Abel Barrera", "Maicol Barrera",
            "Estephany Berríos", "Amy Cañas", "Mauricio Córdova",
            "Óscar Kennedy", "Estiven Hernández", "Juan David",
            "Yuleyde López", "Cintia Martínez", "Wilmer Mejía",
            "Lisbeth Mejía", "Kevin Monterrosa", "Alfredo Osorio",
            "Ángel Quezada", "Sophia Quinteros", "Leonel Rivera"
        ];

        let activeStudents = [];
        let eliminatedStudents = [];

        // 1. Inicializar Modal
        window.onload = () => {
            const listContainer = document.getElementById('checkbox-list');
            allStudents.forEach((student, index) => {
                const label = document.createElement('label');
                label.className = 'student-checkbox';
                label.innerHTML = `
                    <input type="checkbox" id="student-${index}" value="${student}" checked>
                    ${student}
                `;
                listContainer.appendChild(label);
            });
        };

        // 2. Comenzar el juego
        function iniciarJuego() {
            const checkboxes = document.querySelectorAll('.student-checkbox input:checked');
            if (checkboxes.length < 2) {
                alert("Por favor, selecciona al menos 2 estudiantes para jugar.");
                return;
            }

            checkboxes.forEach(cb => {
                activeStudents.push(cb.value);
            });

            // Ocultar modal y mostrar juego
            document.getElementById('modal-overlay').style.display = 'none';
            document.getElementById('game-container').style.display = 'block';

            renderizarPantalla();
        }

        // 3. Renderizar Tarjetas
        function renderizarPantalla() {
            const activeGrid = document.getElementById('active-grid');
            const eliminatedGrid = document.getElementById('eliminated-grid');
            const winnerBanner = document.getElementById('winner-banner');
            const titleActivos = document.getElementById('title-activos');
            const subtitleActivos = document.getElementById('subtitle-activos');

            document.getElementById('count-activos').innerText = activeStudents.length;

            activeGrid.innerHTML = '';
            eliminatedGrid.innerHTML = '';

            // Verificar Ganador
            if (activeStudents.length === 1 && eliminatedStudents.length > 0) {
                lanzarConfeti();
                winnerBanner.style.display = 'block';
                document.getElementById('winner-name').innerText = activeStudents[0];
                titleActivos.style.display = 'none';
                subtitleActivos.style.display = 'none';
            } else {
                winnerBanner.style.display = 'none';
                titleActivos.style.display = 'block';
                subtitleActivos.style.display = 'block';
            }

            // Renderizar Activos
            activeStudents.forEach((student, index) => {
                const card = document.createElement('div');
                card.className = 'card active-card pop-in';
                card.innerHTML = `<h3>${student}</h3>`;
                card.onclick = () => eliminarEstudiante(index, card);
                activeGrid.appendChild(card);
            });

            // Renderizar Eliminados
            eliminatedStudents.forEach((student, index) => {
                const card = document.createElement('div');
                card.className = 'card eliminated-card pop-in';
                card.innerHTML = `
                    <h3>${student}</h3>
                    <button class="save-btn" onclick="salvarEstudiante(${index}, this.parentElement)">¡Salvar!</button>
                `;
                eliminatedGrid.appendChild(card);
            });
        }

        // 4. Lógica para Eliminar
        function eliminarEstudiante(index, cardElement) {
            cardElement.classList.add('fade-out');

            setTimeout(() => {
                const student = activeStudents.splice(index, 1)[0];
                eliminatedStudents.push(student);
                renderizarPantalla();
            }, 300);
        }

        // 5. Lógica para Salvar
        function salvarEstudiante(index, cardElement) {
            event.stopPropagation();

            cardElement.classList.add('fade-out');

            setTimeout(() => {
                const student = eliminatedStudents.splice(index, 1)[0];
                activeStudents.push(student);
                renderizarPantalla();
            }, 300);
        }

        // 6. Efecto de Confeti
        function lanzarConfeti() {
            var duration = 3000;
            var end = Date.now() + duration;

            (function frame() {
                confetti({
                    particleCount: 5,
                    angle: 60,
                    spread: 55,
                    origin: { x: 0 },
                    colors: ['#ff6b81', '#ffffff', '#2ed573']
                });
                confetti({
                    particleCount: 5,
                    angle: 120,
                    spread: 55,
                    origin: { x: 1 },
                    colors: ['#ff6b81', '#ffffff', '#2ed573']
                });

                if (Date.now() < end) {
                    requestAnimationFrame(frame);
                }
            }());
        }
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dinámica de Eliminación - 2do Año (Modificado)</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            /* Nuevo degradado animado para el fondo */
            --bg-animation-duration: 20s;
            --bg-color-1: #667eea;
            --bg-color-2: #764ba2;
            --bg-color-3: #ff7e5f;
            --bg-color-4: #feb47b;
            --bg-color-5: #764ba2;
            --bg-color-6: #667eea;

            /* Variables de tarjetas activas con degradados variados */
            --card-active-bg-1: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%); /* Azul oscuro */
            --card-active-bg-2: linear-gradient(135deg, #2d3436 0%, #636e72 100%); /* Gris oscuro */
            --card-active-bg-3: linear-gradient(135deg, #a044ff 0%, #6a3093 100%); /* Violeta oscuro */
            --card-active-bg-4: linear-gradient(135deg, #cc2b5e 0%, #753a88 100%); /* Rojo/violeta oscuro */
            --card-active-bg-5: linear-gradient(135deg, #00b09b 0%, #96c93d 100%); /* Verde/azul oscuro */
            --card-active-bg-6: linear-gradient(135deg, #fc4a1a 0%, #f7b733 100%); /* Naranja oscuro */
            --card-active-bg-7: linear-gradient(135deg, #200122 0%, #6f0000 100%); /* Negro/rojo oscuro */
            --card-active-bg-8: linear-gradient(135deg, #0f2027 0%, #203a43 50%, #2c5364 100%); /* Negro/azul oscuro */
            
            /* Tarjetas ELIMINADAS: Oscuras y compactas */
            --card-eliminated-bg: #1c1c1c; /* Negro carbón */
            --card-eliminated-text: rgba(255, 255, 255, 0.7);
            --card-eliminated-border: rgba(255, 255, 255, 0.1);
            
            --text-main: #f0f0f0; /* Texto claro para fondo oscuro */
            --primary-btn: #ff4757;
            --primary-hover: #ff6b81;
            --save-btn: #2ed573;
            --save-hover: #7bed9f;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Poppins', sans-serif;
        }

        body {
            /* Fondo con degradado animado y cambiante constantemente */
            background: linear-gradient(120deg, var(--bg-color-1), var(--bg-color-2), var(--bg-color-3), var(--bg-color-4), var(--bg-color-5), var(--bg-color-6));
            background-size: 400% 400%;
            animation: gradient-flow var(--bg-animation-duration) ease infinite;
            min-height: 100vh;
            color: var(--text-main);
            padding: 30px 20px;
            overflow-x: hidden;
        }

        @keyframes gradient-flow {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        h1, h2 {
            text-align: center;
            color: #fff;
            letter-spacing: 1px;
        }

        h1 {
            font-size: 2.5rem;
            font-weight: 800;
            text-shadow: 0 4px 15px rgba(0,0,0,0.3);
            margin-bottom: 5px;
        }

        /* --- MODAL --- */
        #modal-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.6); /* Más oscuro para contraste */
            backdrop-filter: blur(8px); /* Efecto cristal */
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .modal-content {
            background: #ffffff;
            padding: 40px;
            border-radius: 24px;
            width: 90%;
            max-width: 600px;
            max-height: 85vh;
            display: flex;
            flex-direction: column;
            box-shadow: 0 25px 50px rgba(0,0,0,0.5);
            animation: popIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        }

        .modal-content h2 {
            color: #2d3436;
            margin-bottom: 10px;
            font-weight: 800;
        }

        .modal-content p {
            text-align: center;
            margin-bottom: 25px;
            color: #636e72;
            font-size: 0.95rem;
        }

        #checkbox-list {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            overflow-y: auto;
            padding-right: 10px;
            margin-bottom: 20px;
        }

        /* Scrollbar personalizado para el modal */
        #checkbox-list::-webkit-scrollbar { width: 6px; }
        #checkbox-list::-webkit-scrollbar-track { background: #f1f2f6; border-radius: 10px; }
        #checkbox-list::-webkit-scrollbar-thumb { background: #b2bec3; border-radius: 10px; }

        .student-checkbox {
            display: flex;
            align-items: center;
            padding: 12px 15px;
            background: #f8f9fa;
            border: 2px solid transparent;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.2s ease;
            font-weight: 600;
            color: #2d3436;
        }

        .student-checkbox:hover {
            background: #f1f2f6;
            transform: translateY(-2px);
        }

        .student-checkbox input {
            margin-right: 12px;
            width: 18px;
            height: 18px;
            accent-color: var(--primary-btn);
            cursor: pointer;
        }

        .start-btn {
            width: 100%;
            padding: 16px;
            background: var(--primary-btn);
            color: white;
            border: none;
            border-radius: 14px;
            font-size: 1.1rem;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 1px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 8px 20px rgba(255, 71, 87, 0.4);
        }

        .start-btn:hover {
            background: var(--primary-hover);
            transform: translateY(-3px);
            box-shadow: 0 12px 25px rgba(255, 71, 87, 0.5);
        }

        /* --- CONTENEDORES Y TARJETAS --- */
        .container {
            max-width: 1200px;
            margin: 0 auto;
            display: none;
        }

        .subtitle {
            text-align: center;
            color: rgba(255, 255, 255, 0.9);
            margin-bottom: 30px;
            font-size: 1rem;
            font-weight: 400;
        }

        .section-title {
            margin-top: 100px; /* MÁS ESPACIO entre activos y eliminados */
            margin-bottom: 25px;
            font-size: 1.8rem;
            color: rgba(255, 255, 255, 0.9);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
        }

        .section-title::before, .section-title::after {
            content: '';
            height: 2px;
            background: rgba(255,255,255,0.2);
            flex: 1;
            max-width: 100px;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); /* Tarjetas más compactas */
            gap: 15px; /* Menos espacio entre tarjetas */
        }

        .card {
            background: var(--card-active-bg-1); /* Fondo por defecto */
            padding: 15px; /* COMPACTA: Menos padding */
            border-radius: 14px; /* COMPACTA: Bordes más pequeños */
            text-align: center;
            font-weight: 600;
            box-shadow: 0 8px 15px rgba(0,0,0,0.2);
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1), background 0.3s ease;
            position: relative;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 80px; /* COMPACTA: Menor altura mínima */
            color: #fff; /* Texto blanco para fondos oscuros */
        }

        .card h3 {
            font-size: 0.9rem; /* COMPACTA: Texto más pequeño */
            margin: 0;
            color: inherit; /* Hereda color blanco de .card */
            word-wrap: break-word;
            max-width: 100%;
        }

        .card.active-card {
            border-bottom: 4px solid var(--primary-btn); /* Borde más pequeño */
        }

        /* Asignar degradados variados a las tarjetas activas */
        .active-card:nth-child(8n+1) { background: var(--card-active-bg-1); }
        .active-card:nth-child(8n+2) { background: var(--card-active-bg-2); }
        .active-card:nth-child(8n+3) { background: var(--card-active-bg-3); }
        .active-card:nth-child(8n+4) { background: var(--card-active-bg-4); }
        .active-card:nth-child(8n+5) { background: var(--card-active-bg-5); }
        .active-card:nth-child(8n+6) { background: var(--card-active-bg-6); }
        .active-card:nth-child(8n+7) { background: var(--card-active-bg-7); }
        .active-card:nth-child(8n+8) { background: var(--card-active-bg-8); }

        .card.active-card:hover {
            transform: translateY(-5px) scale(1.02); /* Animación hover más suave */
            box-shadow: 0 12px 20px rgba(0,0,0,0.25);
            border-bottom-color: var(--primary-hover);
        }

        /* Tarjetas ELIMINADAS: Oscuras y compactas */
        .card.eliminated-card {
            background: var(--card-eliminated-bg);
            backdrop-filter: blur(5px);
            border: 1px solid var(--card-eliminated-border);
            border-bottom: 4px solid rgba(255, 255, 255, 0.2);
            box-shadow: none;
            cursor: default;
            color: var(--card-eliminated-text);
        }

        .card.eliminated-card h3 {
            color: var(--card-eliminated-text) !important;
            text-decoration: line-through;
            font-weight: 400;
        }

        .save-btn {
            margin-top: 10px; /* Menos espacio */
            padding: 6px 15px; /* Botón más compacto */
            background: var(--save-btn);
            color: #fff;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 800;
            font-size: 0.8rem; /* Texto más pequeño */
            text-transform: uppercase;
            transition: all 0.3s ease;
            box-shadow: 0 3px 6px rgba(46, 213, 115, 0.3);
        }

        .save-btn:hover {
            background: var(--save-hover);
            transform: scale(1.05);
            box-shadow: 0 5px 10px rgba(46, 213, 115, 0.4);
        }

        /* --- ANIMACIONES --- */
        /* SE MANTIENE LA ANIMACIÓN DE CAÍDA AL ELIMINAR */
        .fade-out {
            opacity: 0;
            transform: scale(0.8) translateY(30px); /* Caída más pronunciada */
            pointer-events: none; /* Evitar clics durante la animación */
        }

        .pop-in {
            animation: popIn 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        }

        @keyframes popIn {
            0% { opacity: 0; transform: scale(0.8) translateY(10px); }
            100% { opacity: 1; transform: scale(1) translateY(0); }
        }

        /* --- GANADOR --- */
        #winner-banner {
            display: none;
            text-align: center;
            background: linear-gradient(135deg, #f6d365 0%, #fda085 100%);
            padding: 50px 20px;
            border-radius: 24px;
            margin-bottom: 40px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.3);
            border: 4px solid #fff;
            animation: popIn 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        }

        #winner-banner h2 {
            color: #fff;
            font-size: 1.5rem;
            text-transform: uppercase;
            letter-spacing: 3px;
            margin-bottom: 10px;
            text-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        #winner-banner h1 {
            color: #fff;
            font-size: 4rem;
            margin: 0;
            text-shadow: 0 4px 10px rgba(0,0,0,0.2);
        }
    </style>
</head>
<body>

    <div id="modal-overlay">
        <div class="modal-content">
            <h2>Pasar Asistencia</h2>
            <p>Desmarca a los estudiantes que no asistieron hoy para excluirlos de la dinámica.</p>
            <div id="checkbox-list"></div>
            <button class="start-btn" onclick="iniciarJuego()">Comenzar Dinámica</button>
        </div>
    </div>

    <div id="game-container" class="container">
        
        <div id="winner-banner">
            <h2>¡Tenemos un ganador!</h2>
            <h1 id="winner-name"></h1>
        </div>

        <h1 id="title-activos">Estudiantes Activos (<span id="count-activos">0</span>)</h1>
        <p class="subtitle" id="subtitle-activos">Toca la tarjeta de un estudiante para eliminarlo de la ronda.</p>
        
        <div id="active-grid" class="grid">
            </div>

        <h2 class="section-title">Zona de Eliminados</h2>
        <div id="eliminated-grid" class="grid">
            </div>
    </div>

    <script>
        // Lista original MODIFICADA a un solo nombre por estudiante
        const allStudents = [
            "José", "Abel", "Maicol", 
            "Estephany", "Amy", "Mauricio", 
            "Óscar", "Estiven", "Juan", 
            "Yuleyde", "Cintia", "Wilmer", 
            "Lisbeth", "Kevin", "Alfredo", 
            "Ángel", "Sophia", "Leonel"
        ];

        let activeStudents = [];
        let eliminatedStudents = [];

        // 1. Inicializar Modal
        window.onload = () => {
            const listContainer = document.getElementById('checkbox-list');
            allStudents.forEach((student, index) => {
                const label = document.createElement('label');
                label.className = 'student-checkbox';
                label.innerHTML = `
                    <input type="checkbox" id="student-${index}" value="${student}" checked>
                    ${student}
                `;
                listContainer.appendChild(label);
            });
        };

        // 2. Comenzar el juego
        function iniciarJuego() {
            const checkboxes = document.querySelectorAll('.student-checkbox input:checked');
            if (checkboxes.length < 2) {
                alert("Por favor, selecciona al menos 2 estudiantes para jugar.");
                return;
            }

            checkboxes.forEach(cb => {
                activeStudents.push(cb.value);
            });

            // Ocultar modal y mostrar juego
            document.getElementById('modal-overlay').style.display = 'none';
            document.getElementById('game-container').style.display = 'block';
            
            renderizarPantalla();
        }

        // 3. Renderizar Tarjetas
        function renderizarPantalla() {
            const activeGrid = document.getElementById('active-grid');
            const eliminatedGrid = document.getElementById('eliminated-grid');
            const winnerBanner = document.getElementById('winner-banner');
            const titleActivos = document.getElementById('title-activos');
            const subtitleActivos = document.getElementById('subtitle-activos');
            
            document.getElementById('count-activos').innerText = activeStudents.length;

            activeGrid.innerHTML = '';
            eliminatedGrid.innerHTML = '';

            // Verificar Ganador
            if (activeStudents.length === 1 && eliminatedStudents.length > 0) {
                lanzarConfeti();
                winnerBanner.style.display = 'block';
                document.getElementById('winner-name').innerText = activeStudents[0];
                titleActivos.style.display = 'none';
                subtitleActivos.style.display = 'none';
            } else {
                winnerBanner.style.display = 'none';
                titleActivos.style.display = 'block';
                subtitleActivos.style.display = 'block';
            }

            // Renderizar Activos: Compactas, degradados oscuros variados
            activeStudents.forEach((student, index) => {
                const card = document.createElement('div');
                card.className = 'card active-card pop-in';
                // El CSS usará nth-child para los degradados
                card.innerHTML = `<h3>${student}</h3>`;
                card.onclick = () => eliminarEstudiante(index, card);
                activeGrid.appendChild(card);
            });

            // Renderizar Eliminados: Oscuras y compactas
            eliminatedStudents.forEach((student, index) => {
                const card = document.createElement('div');
                card.className = 'card eliminated-card pop-in';
                card.innerHTML = `
                    <h3 style="text-decoration: line-through;">${student}</h3>
                    <button class="save-btn" onclick="salvarEstudiante(${index}, this.parentElement)">¡Salvar!</button>
                `;
                eliminatedGrid.appendChild(card);
            });
        }

        // 4. Lógica para Eliminar: SE MANTIENE LA ANIMACIÓN DE CAÍDA
        function eliminarEstudiante(index, cardElement) {
            // Añadir clase de animación de salida
            cardElement.classList.add('fade-out');
            
            // Esperar a que termine la animación (300ms) antes de mover los datos
            setTimeout(() => {
                const student = activeStudents.splice(index, 1)[0];
                eliminatedStudents.push(student);
                renderizarPantalla();
            }, 300);
        }

        // 5. Lógica para Salvar: SE MANTIENE LA ANIMACIÓN DE CAÍDA (aunque es menos obvia al salvar)
        function salvarEstudiante(index, cardElement) {
            // Evitar que el clic se propague
            event.stopPropagation();

            cardElement.classList.add('fade-out');
            
            setTimeout(() => {
                const student = eliminatedStudents.splice(index, 1)[0];
                activeStudents.push(student);
                renderizarPantalla();
            }, 300);
        }

        // 6. Efecto de Confeti (Opcional, hace la victoria más emocionante)
        function lanzarConfeti() {
            var duration = 3000;
            var end = Date.now() + duration;

            (function frame() {
                confetti({
                    particleCount: 5,
                    angle: 60,
                    spread: 55,
                    origin: { x: 0 },
                    colors: ['#ff6b81', '#ffffff', '#2ed573']
                });
                confetti({
                    particleCount: 5,
                    angle: 120,
                    spread: 55,
                    origin: { x: 1 },
                    colors: ['#ff6b81', '#ffffff', '#2ed573']
                });

                if (Date.now() < end) {
                    requestAnimationFrame(frame);
                }
            }());
        }
    </script>
</body>
</html>
